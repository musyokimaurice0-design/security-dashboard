<script>
const url = "https://eyapcdjmvonfahvitixr.supabase.co/rest/v1/login_events?select=*"
const key = "YOUR_ANON_KEY"

async function loadData() {
  const res = await fetch(url, {
    method: "GET",
    headers: {
      apikey: key,
      Authorization: "Bearer " + key
    }
  })

  const data = await res.json()

  document.getElementById("data").innerHTML =
    data.map(d =>
      `${d.user_id} | ${d.risk} | ${d.action} | ${d.reason}`
    ).join("<br>")
}

loadData()
</script>
